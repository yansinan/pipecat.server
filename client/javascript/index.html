<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice UI Kit - Vanilla JS</title>
</head>

<body>
  <!-- 全屏动态背景（screensaver） -->
  <iframe id="screensaver" src="http://home.z-core.cn:8080/screensaver.web/"></iframe>

  <!-- 浮动 UI 层（包在 app-overlay 中，浮在 screensaver 之上） -->
  <div id="app-overlay">
    <div class="container">
      <!-- Header with controls -->
      <div class="header">
        <div class="transport-selector">
          <label for="transport-select">Transport:</label>
          <select id="transport-select">
            <option value="smallwebrtc">SmallWebRTC</option>
            <option value="daily">Daily</option>
          </select>
        </div>
        <div class="controls">
          <button id="mic-btn" class="control-btn" disabled>
            🎤 <span id="mic-status">Mic is Off</span>
          </button>
          <button id="connect-btn" class="connect-btn">Connect</button>
        </div>
      </div>

      <!-- 内容区：Events + Conversation 同一行内联，自动换行 -->
      <div class="main-content">
        <!-- Events panel (left, inline with conversation) -->
        <div class="events-panel">
          <h3>Events</h3>
          <div id="events-log"></div>
        </div>

        <!-- Conversation panel (right, inline with events) -->
        <div class="conversation-panel">
          <h3>Conversation</h3>
          <div id="conversation-log"></div>
        </div>
      </div>

      <!-- Video panel（底部，无视频时自动隐藏） -->
      <div class="video-panel">
        <div id="bot-video-container">
          <div class="video-placeholder">
            <span>Video will appear here when connected</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 浮动测试语音按钮 -->
  <button id="test-audio-btn" class="test-audio-btn" title="发送测试语音（排除麦克风问题）">🎧 测试语音</button>

  <script type="module" src="/src/app.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</body>

</html>
